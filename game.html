<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تاسي سيم — محاكي التداول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2a3d;
  --border:#ffffff14;--border2:#ffffff22;
  --text:#e8edf5;--text2:#8b99b0;--text3:#5a6880;
  --green:#00d084;--red:#ff4d6d;--gold:#f5c542;--blue:#4d9fff;
  --greenBg:#00d08415;--redBg:#ff4d6d15;--goldBg:#f5c54215;
  --r:10px;--r2:14px;
}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}

/* ─── HEADER ─── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.header-right{display:flex;align-items:center;gap:10px}
.balance-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:13px;color:var(--text2)}
.balance-chip b{color:var(--green);font-weight:600}
.live-badge{background:var(--greenBg);border:1px solid var(--green);color:var(--green);font-size:11px;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}

/* ─── TABS ─── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);padding:0 20px;overflow-x:auto}
.tab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text)}

/* ─── CONTENT ─── */
.content{padding:20px;max-width:1100px;margin:0 auto}

/* ─── STATS ─── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.04em}
.stat-val{font-size:20px;font-weight:600;line-height:1.2}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ─── CARD ─── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}

/* ─── TOOLBAR ─── */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.market-title{font-size:14px;font-weight:600}
.search-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;color:var(--text);outline:none;width:200px;font-family:inherit}
.search-box:focus{border-color:var(--border2)}
.search-box::placeholder{color:var(--text3)}

/* ─── PILLS ─── */
.pills{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:.15s}
.pill.active{background:var(--blue);border-color:var(--blue);color:#fff}
.pill:hover:not(.active){border-color:var(--border2);color:var(--text)}

/* ─── TABLE ─── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:var(--text3);font-weight:500;padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);letter-spacing:.04em}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.data-row:hover td{background:var(--bg3);cursor:pointer}
.tbl tr.data-row{transition:.1s}

.stock-cell{display:flex;align-items:center;gap:10px}
.slogo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sname{font-weight:500;font-size:13px}
.ssym{font-size:11px;color:var(--text3)}
.in-port{font-size:10px;background:var(--goldBg);color:var(--gold);padding:1px 6px;border-radius:8px;margin-right:4px}

.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500}
.b-big{background:#4d9fff18;color:var(--blue)}
.b-small{background:#f5c54220;color:var(--gold)}
.b-other{background:#ffffff0d;color:var(--text3)}

.up{color:var(--green);font-weight:500}
.dn{color:var(--red);font-weight:500}
.neutral{color:var(--text3)}

/* ─── BUTTONS ─── */
.btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:inherit;white-space:nowrap}
.btn-buy{background:var(--green);color:#000}
.btn-buy:hover{filter:brightness(1.1)}
.btn-sell{background:var(--red);color:#fff}
.btn-sell:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:9px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;flex:1}
.btn-primary{background:var(--green);color:#000;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;flex:2;border:none}
.btn-primary.sell{background:var(--red);color:#fff}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

/* ─── LOADING ─── */
.loading-row td{text-align:center;padding:40px;color:var(--text3)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-row td{text-align:center;padding:30px;color:var(--red)}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:390px;max-width:95vw}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:15px;color:var(--text);outline:none;font-family:'IBM Plex Mono',monospace}
.form-input:focus{border-color:var(--blue)}
.order-box{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:16px}
.order-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--text2)}
.order-row b{color:var(--text);font-weight:500}
.order-row.total-row{font-size:13px;font-weight:600;color:var(--text);border-top:1px solid var(--border);margin-top:6px;padding-top:8px}
.modal-footer{display:flex;gap:10px}
.market-hours{font-size:11px;color:var(--text3);margin-top:8px;text-align:center}

/* ─── PORTFOLIO ─── */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.pos-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pos-btns{display:flex;gap:6px;margin-top:10px}

/* ─── LEADERBOARD ─── */
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--border);border-radius:8px}
.lb-row:last-child{border-bottom:none}
.lb-row.me{background:var(--bg3)}
.lb-rank{font-size:16px;font-weight:700;color:var(--text3);width:28px;text-align:center}
.lb-rank.g{color:var(--gold)}.lb-rank.s{color:#aaa}.lb-rank.b{color:#cd7f32}
.lb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
.lb-info{flex:1}
.lb-name{font-size:13px;font-weight:500}
.lb-sub{font-size:11px;color:var(--text3)}
.lb-ret{font-size:14px;font-weight:600}

/* ─── HISTORY ─── */
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:11px 20px;font-size:13px;z-index:400;animation:slideup .25s;box-shadow:0 8px 32px #0009;white-space:nowrap}
@keyframes slideup{from{opacity:0;transform:translateX(-50%) translateY(12px)}}

/* ─── UPDATE TICKER ─── */
.update-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:6px 20px;font-size:11px;color:var(--text3);display:flex;justify-content:space-between;align-items:center}
.update-bar span{color:var(--text2)}
.refresh-btn{background:transparent;border:none;color:var(--blue);font-size:11px;cursor:pointer;font-family:inherit;padding:0}
.refresh-btn:hover{text-decoration:underline}

@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr}
  .tbl th:nth-child(3),.tbl td:nth-child(3){display:none}
}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      تاسي سيم
    </div>
    <div class="header-right">
      <div class="live-badge" id="live-badge">
        <div class="live-dot"></div>
        <span id="market-status">جاري التحميل...</span>
      </div>
      <div class="balance-chip">رصيدي: <b id="hdr-cash">100,000</b> ر.س</div>
    </div>
  </div>

  <!-- UPDATE BAR -->
  <div class="update-bar">
    <span>آخر تحديث: <span id="last-update">—</span></span>
    <button class="refresh-btn" onclick="loadQuotes(true)">⟳ تحديث الأسعار</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('market')">السوق</div>
    <div class="tab" onclick="switchTab('portfolio')">محفظتي</div>
    <div class="tab" onclick="switchTab('leaderboard')">المتصدرون</div>
    <div class="tab" onclick="switchTab('history')">سجل الصفقات</div>
  </div>

  <!-- MAIN -->
  <div class="content" id="main"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" style="display:none"></div>

<script>
// ══════════════════════════════════════════════
//  ⚠️  غيّر هذا الرابط بعد نشر الـ Backend على Vercel
// ══════════════════════════════════════════════
const API_BASE = 'https://tdawl.vercel.app';// ← ضع رابطك هنا

// Fallback prices (تُستخدم إذا فشل الـ API أو خارج ساعات السوق)
const FALLBACK = {
  '2222':28.55,'1120':87.20,'2010':91.40,'7010':58.70,
  '1180':24.30,'1030':42.10,'2082':178.00,'4030':12.60,
  '1060':19.80,'1080':33.60,'4321':4.20,'1832':3.10,
  '2100':2.70,'6070':5.80,'1831':6.40,'2290':3.90,
  '3030':7.20,'4143':4.50,'2210':2.30,'4261':8.10,
  '4020':13.80,'2370':22.40,'2280':41.00,'6001':9.60,
  '2090':16.70,'4050':34.20,'2120':27.50,'7200':52.30,
  '4001':18.90,'2170':7.80,
};

const COLORS = {
  '2222':['#0f2a4a','#4d9fff'],'1120':['#0f2e1f','#00d084'],
  '2010':['#2e1f0f','#f5c542'],'7010':['#1e0f2e','#a78bfa'],
  '1180':['#0f1e2e','#60a5fa'],'1030':['#0f2e1a','#34d399'],
  '2082':['#2e0f1a','#f472b6'],'4030':['#0f1a2e','#38bdf8'],
  '1060':['#1a0f2e','#c084fc'],'1080':['#2e1a0f','#fb923c'],
  '4321':['#0f2010','#86efac'],'1832':['#2e1010','#fca5a5'],
  '2100':['#10102e','#a5b4fc'],'6070':['#2e200f','#fde68a'],
  '1831':['#10202a','#6ee7b7'],'2290':['#20102e','#d8b4fe'],
  '3030':['#2e101a','#f9a8d4'],'4143':['#10201a','#4ade80'],
  '2210':['#2e1a10','#fdba74'],'4261':['#102030','#7dd3fc'],
  '4020':['#200f0f','#fca5a5'],'2370':['#0f1e20','#7dd3fc'],
  '2280':['#201e0f','#fde68a'],'6001':['#0f1820','#a5b4fc'],
  '2090':['#0f2015','#86efac'],'4050':['#201a0f','#fdba74'],
  '2120':['#0f1820','#93c5fd'],'7200':['#20180f','#fcd34d'],
  '4001':['#180f20','#c4b5fd'],'2170':['#0f2015','#a7f3d0'],
};

// ──── STATE ────
let state = {
  tab: 'market',
  filter: 'all',
  search: '',
  cash: 100000,
  portfolio: {},
  trades: [],
  quotes: [],
  loading: true,
  error: null,
  lastUpdate: null,
  players: [
    {name:'خالد العنزي',  av:'خ',bg:'#0f1e2e',tc:'#4d9fff',ret:18.4,val:118400},
    {name:'سارة المطيري', av:'س',bg:'#0f2e1f',tc:'#00d084',ret:14.2,val:114200},
    {name:'أنت',          av:'م',bg:'#2e1f0f',tc:'#f5c542',ret:0,   val:100000,me:true},
    {name:'فهد الشمري',   av:'ف',bg:'#1e0f2e',tc:'#a78bfa',ret:-3.1,val:96900},
    {name:'نوف الحربي',   av:'ن',bg:'#0f1a2e',tc:'#60a5fa',ret:-7.8,val:92200},
  ],
};

// ──── HELPERS ────
const fmt  = n => (n??0).toLocaleString('ar-SA',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI = n => Math.round(n??0).toLocaleString('ar-SA');
const pct  = n => `${n>=0?'+':''}${(n??0).toFixed(2)}%`;
const clr  = n => n>0?'up':n<0?'dn':'neutral';

function getPrice(id) {
  const q = state.quotes.find(x => x.id === id);
  return q?.price ?? FALLBACK[id] ?? 0;
}
function getPrevClose(id) {
  const q = state.quotes.find(x => x.id === id);
  return q?.prevClose ?? getPrice(id);
}

// ──── MARKET STATUS ────
function getMarketStatus() {
  const now = new Date();
  const riyadh = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Riyadh'}));
  const day = riyadh.getDay(); // 0=Sun,1=Mon,...,5=Fri,6=Sat
  const h = riyadh.getHours();
  const m = riyadh.getMinutes();
  const mins = h*60+m;
  const isWeekday = day>=0 && day<=3; // Sun-Wed open, Thu close 15:00
  const isThurs = day===4;
  const open = 10*60, close = 15*60;
  if((isWeekday || isThurs) && mins>=open && mins<close) return {open:true,label:'السوق مفتوح'};
  return {open:false,label:'السوق مغلق'};
}

// ──── LOAD QUOTES ────
async function loadQuotes(force=false) {
  state.loading = true;
  renderContent();

  try {
    const res = await fetch(`${API_BASE}/api/quotes`, {
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');

    state.quotes = json.data;
    state.error = null;
    state.lastUpdate = new Date();
    document.getElementById('last-update').textContent =
      state.lastUpdate.toLocaleTimeString('ar-SA');
  } catch(err) {
    console.warn('API failed, using fallback:', err.message);
    // استخدام الـ fallback مع إضافة تغيير عشوائي صغير لإظهار الحركة
    state.quotes = Object.entries(FALLBACK).map(([id,price])=>({
      id, price,
      change: parseFloat(((Math.random()-0.5)*0.8).toFixed(2)),
      changePct: parseFloat(((Math.random()-0.5)*1.5).toFixed(2)),
      prevClose: parseFloat((price * (1-(Math.random()-0.5)*0.01)).toFixed(2)),
      error: 'fallback'
    }));
    state.error = '⚠️ تعذّر الاتصال بـ API — يُعرض آخر سعر متاح';
  }

  state.loading = false;

  // تحديث حالة السوق
  const ms = getMarketStatus();
  const badge = document.getElementById('live-badge');
  const label = document.getElementById('market-status');
  if(ms.open){
    badge.style.borderColor='var(--green)';badge.style.color='var(--green)';
    badge.style.background='var(--greenBg)';
  } else {
    badge.style.borderColor='var(--red)';badge.style.color='var(--red)';
    badge.style.background='var(--redBg)';
  }
  label.textContent = ms.label;

  updateMyPlayer();
  renderContent();
}

// ──── UPDATE MY PLAYER ────
function updateMyPlayer() {
  let total = state.cash;
  Object.entries(state.portfolio).forEach(([id,pos]) => {
    total += pos.qty * getPrice(id);
  });
  const ret = ((total-100000)/1000).toFixed(2);
  const me = state.players.find(p=>p.me);
  me.ret = parseFloat(ret); me.val = total;
}

// ──── SWITCH TAB ────
function switchTab(t) {
  state.tab = t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['market','portfolio','leaderboard','history'][i]===t);
  });
  renderContent();
}

function renderContent() {
  if(state.tab==='market') renderMarket();
  else if(state.tab==='portfolio') renderPortfolio();
  else if(state.tab==='leaderboard') renderLeaderboard();
  else renderHistory();
}

// ──── RENDER MARKET ────
function renderMarket() {
  const total = state.cash + Object.entries(state.portfolio)
    .reduce((s,[id,p])=>s+p.qty*getPrice(id),0);
  const pnl = Object.entries(state.portfolio)
    .reduce((s,[id,p])=>s+p.qty*(getPrice(id)-p.avgCost),0);
  const retPct = ((total-100000)/100000*100).toFixed(2);

  let rows = '';
  if(state.loading) {
    rows = `<tr class="loading-row"><td colspan="6">جاري تحميل الأسعار الحقيقية<span class="spinner"></span></td></tr>`;
  } else {
    const list = state.quotes.filter(q=>{
      if(state.filter!=='all' && q.cat && q.cat!==state.filter) return false;
      if(!state.filter || state.filter==='all') {
        const stock = getStockMeta(q.id);
        if(state.filter!=='all' && stock.cat!==state.filter) return false;
      }
      if(state.search) {
        const m = getStockMeta(q.id);
        if(!m.name.includes(state.search) && !q.id.includes(state.search)) return false;
      }
      return true;
    });

    const STOCKS_META = getStocksWithCat();
    const filtered = STOCKS_META.filter(s=>{
      if(state.filter!=='all' && s.cat!==state.filter) return false;
      if(state.search && !s.name.includes(state.search) && !s.id.includes(state.search)) return false;
      return true;
    });

    rows = filtered.map(s=>{
      const q = state.quotes.find(x=>x.id===s.id)||{};
      const price = q.price ?? FALLBACK[s.id] ?? 0;
      const chgPct = q.changePct ?? 0;
      const chg = q.change ?? 0;
      const up = chgPct >= 0;
      const [bg,tc] = COLORS[s.id]||['#1a2235','#aaa'];
      const pos = state.portfolio[s.id];
      const portBadge = pos?`<span class="in-port">${pos.qty} سهم</span>`:'';
      const catBadge = s.cat==='big'?'<span class="badge b-big">كبرى</span>':
                       s.cat==='small'?'<span class="badge b-small">صغرى</span>':
                       '<span class="badge b-other">متنوع</span>';
      return `<tr class="data-row" onclick="openOrder('${s.id}','buy')">
        <td><div class="stock-cell">
          <div class="slogo" style="background:${bg};color:${tc}">${s.id.slice(-2)}</div>
          <div><div class="sname">${s.name} ${portBadge}</div><div class="ssym">${s.id}</div></div>
        </div></td>
        <td>${catBadge}</td>
        <td class="mono" style="font-size:14px">${fmt(price)}</td>
        <td class="${clr(chgPct)}">${pct(chgPct)}</td>

      <div class="stat-card"><div class="stat-label">النقدي المتاح</div><div class="stat-val mono">${fmtI(state.cash)}</div><div class="stat-sub">ريال سعودي</div></div>
      <div class="stat-card"><div class="stat-label">صفقات مفتوحة</div><div class="stat-val">${Object.keys(state.portfolio).length}</div><div class="stat-sub">${state.trades.length} صفقة كلياً</div></div>
    </div>
    ${errBar}
    <div class="card">
      <div class="toolbar">

        <input class="search-box" placeholder="ابحث..." value="${state.search}" oninput="state.search=this.value;renderMarket()">
      </div>
      <div class="pills">
        <div class="pill ${state.filter==='all'?'active':''}" onclick="state.filter='all';renderMarket()">الكل (30)</div>
        <div class="pill ${state.filter==='big'?'active':''}" onclick="state.filter='big';renderMarket()">كبرى السوق (10)</div>
        <div class="pill ${state.filter==='small'?'active':''}" onclick="state.filter='small';renderMarket()">صغرى السوق (10)</div>

      <table class="tbl">
        <thead><tr>

// ──── PORTFOLIO ────
function renderPortfolio() {
  const positions = Object.entries(state.portfolio);
  if(!positions.length) {
    document.getElementById('main').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">النقدي المتاح</div><div class="stat-val mono">${fmtI(state.cash)}</div></div>
        <div class="stat-card"><div class="stat-label">قيمة الأسهم</div><div class="stat-val">0</div></div>
        <div class="stat-card"><div class="stat-label">الربح / الخسارة</div><div class="stat-val neutral">0.00</div></div>
        <div class="stat-card"><div class="stat-label">عدد الأسهم</div><div class="stat-val">0</div></div>
      </div>
      <div class="card"><div class="empty">محفظتك فارغة — اذهب للسوق وابدأ التداول</div></div>`;
    return;
  }
  const portVal = positions.reduce((s,[id,p])=>s+p.qty*getPrice(id),0);
  const pnl = positions.reduce((s,[id,p])=>s+p.qty*(getPrice(id)-p.avgCost),0);
  const cards = positions.map(([id,pos])=>{
    const s = getStockMeta(id);
    const price = getPrice(id);
    const pnl2 = pos.qty*(price-pos.avgCost);
    const ret2 = ((price-pos.avgCost)/pos.avgCost*100);
    const [bg,tc] = COLORS[id]||['#1a2235','#aaa'];
    return `<div class="pos-card">
      <div class="pos-header">
        <div>
          <div class="slogo" style="background:${bg};color:${tc};width:28px;height:28px;border-radius:6px;font-size:10px;margin-bottom:5px">${id.slice(-2)}</div>
          <div style="font-size:13px;font-weight:600">${s.name}</div>
          <div style="font-size:11px;color:var(--text3)">${pos.qty} سهم · متوسط ${fmt(pos.avgCost)}</div>
        </div>
        <div style="text-align:left">
          <div style="font-size:15px;font-weight:700;color:${pnl2>=0?'var(--green)':'var(--red)'}">${pnl2>=0?'+':''}${fmtI(pnl2)}</div>
          <div style="font-size:12px;color:${pnl2>=0?'var(--green)':'var(--red)'}">${pct(ret2)}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px">
        <span>السعر الحالي</span><span class="mono">${fmt(price)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:10px">
        <span>القيمة الإجمالية</span><span class="mono">${fmtI(pos.qty*price)}</span>
      </div>
      <div class="pos-btns">
        <button class="btn btn-buy" onclick="openOrder('${id}','buy')">شراء المزيد</button>
        <button class="btn btn-sell" onclick="openOrder('${id}','sell')">بيع</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">قيمة الاستثمار</div><div class="stat-val mono">${fmtI(portVal)}</div></div>
      <div class="stat-card"><div class="stat-label">الربح / الخسارة</div><div class="stat-val ${clr(pnl)}">${pnl>=0?'+':''}${fmtI(pnl)}</div></div>
      <div class="stat-card"><div class="stat-label">النقدي المتاح</div><div class="stat-val mono">${fmtI(state.cash)}</div></div>
      <div class="stat-card"><div class="stat-label">نسبة العائد</div><div class="stat-val ${clr(pnl)}">${pct((portVal+state.cash-100000)/1000)}</div></div>
    </div>
    <div class="card">
      <div class="market-title" style="margin-bottom:14px">مراكزي المفتوحة (${positions.length})</div>
      <div class="pos-grid">${cards}</div>
    </div>`;
}

// ──── ORDER MODAL ────
function openOrder(id, type) {
  const s = getStockMeta(id);
  const price = getPrice(id);
  const pos = state.portfolio[id];
  const maxBuy = Math.floor(state.cash / price);
  const maxSell = pos?.qty || 0;
  if(type==='sell' && !maxSell){ showToast('❌ لا تملك أسهماً في '+s.name); return; }

  const [bg,tc] = COLORS[id]||['#1a2235','#aaa'];
  const q = state.quotes.find(x=>x.id===id)||{};
  const chgPct = q.changePct??0;

  document.getElementById('modal').style.display='flex';
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div class="slogo" style="background:${bg};color:${tc};width:38px;height:38px;border-radius:10px;font-size:13px">${id.slice(-2)}</div>
      <div>
        <div class="modal-title">${type==='buy'?'شراء':'بيع'} — ${s.name}</div>
        <div style="font-size:12px;color:var(--text3)">${id} · السعر: <span class="mono">${fmt(price)}</span> ر.س · <span class="${clr(chgPct)}">${pct(chgPct)}</span></div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">عدد الأسهم <span style="color:var(--text3)">(الحد الأقصى: ${type==='buy'?maxBuy:maxSell})</span></label>
      <input type="number" class="form-input" id="qty-in" min="1" max="${type==='buy'?maxBuy:maxSell}" value="1" oninput="calcOrder('${id}','${type}')">
    </div>
    <div class="order-box" id="order-box">
      <div class="order-row"><span>سعر السهم</span><b class="mono">${fmt(price)} ر.س</b></div>
      <div class="order-row"><span>الكمية</span><b>1</b></div>
      <div class="order-row total-row"><span>${type==='buy'?'إجمالي الدفع':'إجمالي الاستلام'}</span><b class="mono" id="order-total">${fmt(price)} ر.س</b></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn-primary ${type==='sell'?'sell':''}" id="confirm-btn" onclick="execOrder('${id}','${type}')">${type==='buy'?'✅ تأكيد الشراء':'💰 تأكيد البيع'}</button>
    </div>
    <div class="market-hours" id="mh-note"></div>`;
  calcOrder(id, type);
}

function calcOrder(id, type) {
  const price = getPrice(id);
  const qty = parseInt(document.getElementById('qty-in')?.value)||0;
  const total = qty * price;
  const pos = state.portfolio[id];
  const maxBuy = Math.floor(state.cash/price);
  const maxSell = pos?.qty||0;
  const max = type==='buy'?maxBuy:maxSell;
  const valid = qty>=1 && qty<=max;
  if(document.getElementById('order-total')) document.getElementById('order-total').textContent = fmt(total)+' ر.س';
  if(document.getElementById('confirm-btn')) document.getElementById('confirm-btn').disabled = !valid;
}

function execOrder(id, type) {
  const qty = parseInt(document.getElementById('qty-in')?.value)||0;
  if(qty<1){ showToast('❌ أدخل كمية صحيحة'); return; }
  const price = getPrice(id);
  const total = qty * price;
  const s = getStockMeta(id);
  if(type==='buy') {
    if(total>state.cash){ showToast('❌ رصيدك غير كافٍ'); return; }
    state.cash -= total;
    if(!state.portfolio[id]) state.portfolio[id]={qty:0,avgCost:0};
    const pos = state.portfolio[id];
    pos.avgCost = (pos.qty*pos.avgCost+total)/(pos.qty+qty);
    pos.qty += qty;
  } else {
    const pos = state.portfolio[id];
    if(!pos||pos.qty<qty){ showToast('❌ لا تملك هذه الكمية'); return; }
    pos.qty -= qty; state.cash += total;
    if(pos.qty===0) delete state.portfolio[id];
  }
  const now = new Date();
  state.trades.push({id,type,qty,price,total,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`});
  document.getElementById('hdr-cash').textContent = fmtI(state.cash);
  closeModal();
  showToast(`${type==='buy'?'✅ تم الشراء':'💰 تم البيع'} — ${qty} سهم من ${s.name} بـ ${fmt(price)}`);
  renderContent();
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

// ──── TOAST ────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.style.display='none', 3000);
}
